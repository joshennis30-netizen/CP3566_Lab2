#
# Maven Wrapper configuration.
#
# `distributionUrl` is the Apache Maven distribution this wrapper boots.
# The first time a student runs `./mvnw` (or `mvnw.cmd` on Windows), the
# wrapper downloads this ZIP to ~/.m2/wrapper/dists/ and runs Maven from
# there. Subsequent invocations reuse the cached distribution. No
# manual Maven install required on any OS.
#
# `wrapperUrl` is the small bootstrap JAR (already bundled in
# .mvn/wrapper/maven-wrapper.jar inside this project). It's listed here
# for self-documentation and self-update purposes.
#
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.9/apache-maven-3.9.9-bin.zip
wrapperUrl=https://repo.maven.apache.org/maven2/org/apache/maven/wrapper/maven-wrapper/3.3.2/maven-wrapper-3.3.2.jar
